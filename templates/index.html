<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>London Kids Preschool Pachora | Admissions Open 2026-27</title>
    <meta
      name="description"
      content="London Kids Preschool Pachora - safe, caring, activity-based UK concept preschool in Pachora. Admissions open for 2026-27."
    />
    <meta name="theme-color" content="#F4F9FF" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&family=Sora:wght@500;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bgA: "#F4F9FF",
              bgB: "#FFF8E8",
              blueMain: "#1F63FF",
              navyText: "#1A2740",
              softCard: "#FFFFFF",
              pinkSoft: "#FFE5EF",
              mintSoft: "#DFFCF0"
            },
            fontFamily: {
              heading: ["Baloo 2", "cursive"],
              body: ["Nunito", "sans-serif"],
              accent: ["Sora", "sans-serif"]
            },
            boxShadow: {
              soft: "0 12px 28px rgba(31, 74, 167, 0.10)",
              strong: "0 18px 40px rgba(21, 56, 125, 0.18)"
            }
          }
        }
      };
    </script>

    <style>
      html { scroll-behavior: smooth; }
      body { font-family: "Nunito", sans-serif; color: #1A2740; }
      .devanagari { font-family: "Noto Sans Devanagari", "Nirmala UI", sans-serif; }

      .hero-bg {
        background:
          radial-gradient(1200px 420px at -10% -10%, #d9ecff 0%, transparent 55%),
          radial-gradient(900px 320px at 100% 0%, #ffe7f3 0%, transparent 50%),
          linear-gradient(180deg, #f6fbff 0%, #fffdfa 100%);
      }

      .glass {
        background: rgba(255, 255, 255, 0.80);
        backdrop-filter: blur(8px);
      }

      .lift {
        transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      }
      .lift:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 35px rgba(31, 99, 255, 0.14);
        border-color: #b8d1ff;
      }

      .hamburger-line {
        display: block;
        width: 20px;
        height: 2px;
        background: #1A2740;
        border-radius: 999px;
        transition: transform .25s ease, opacity .25s ease;
      }

      .float {
        animation: float 5s ease-in-out infinite;
      }
      @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      .marquee {
        overflow: hidden;
        white-space: nowrap;
      }
      .marquee > span {
        display: inline-block;
        padding-left: 100%;
        animation: marquee 18s linear infinite;
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
      }
    </style>
  </head>
  <body class="bg-bgA">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const navItems = [["Home", "#home"], ["Programs", "#programs"], ["Activities", "#activities"], ["Director", "#director"], ["Contact", "#contact"]];

      const programs = [
        { title: "Play Group", age: "2 to 3 Years", desc: "First school journey with playful learning." },
        { title: "Nursery", age: "3 to 4 Years", desc: "Language, social skills, and curiosity growth." },
        { title: "Junior KG", age: "4 to 5 Years", desc: "Strong foundation through joyful activities." },
        { title: "Senior KG", age: "5 to 6 Years", desc: "Confidence building for primary school readiness." }
      ];

      const activities = [
        ["Sensory Play", "Hands-on exploration and brain development"],
        ["Reading Stories", "Language building through fun storytelling"],
        ["Music & Singing", "Rhythm, listening, and expression"],
        ["Building Blocks", "Creativity and problem solving through play"],
        ["Puzzles & Sorting", "Logic and focus improvement"],
        ["Outdoor Play", "Fitness, confidence, and teamwork"],
        ["Art & Drawing", "Imagination and fine motor skills"],
        ["Language Games", "Speaking and communication confidence"],
        ["Role Playing", "Social learning and emotional expression"],
        ["Counting Games", "Early numeracy in playful way"],
        ["Physical Activities", "Healthy growth and active movement"],
        ["Sleep Routine", "Comfort, care, and healthy habits"]
      ];

      const ageGroups = [
        ["Day Care", "1.5 to 8 Years"],
        ["Pre-Foundation", "1.5 to 2 Years"],
        ["Play Group", "2 to 3 Years"],
        ["Nursery", "3 to 4 Years"],
        ["Junior KG", "4 to 5 Years"],
        ["Senior KG", "5 to 6 Years"],
        ["Class 1", "6+ Years"]
      ];

      const trustPoints = [
        "Safe & Secure Environment",
        "Expert & Caring Teachers",
        "Play Based Learning",
        "Modern Facilities",
        "CCTV Surveillance"
      ];

      function useCounter(end, duration = 1200) {
        const [value, setValue] = useState(0);
        useEffect(() => {
          let i = 0;
          const step = Math.max(16, Math.floor(duration / end));
          const t = setInterval(() => {
            i += 1;
            setValue(i);
            if (i >= end) clearInterval(t);
          }, step);
          return () => clearInterval(t);
        }, [end, duration]);
        return value;
      }

      function App() {
        const [menuOpen, setMenuOpen] = useState(false);
        const [testimonials, setTestimonials] = useState([]);

        const students = useCounter(500);
        const teachers = useCounter(20);
        const years = useCounter(10);

        const ctaWhatsApp = useMemo(() => "https://wa.me/918530838436?text=Hello%20London%20Kids%20Preschool%20Pachora,%20I%20want%20admission%20details%20for%202026-27.", []);

        useEffect(() => {
          fetch("/api/testimonials")
            .then((r) => r.json())
            .then((d) => setTestimonials(d))
            .catch(() => setTestimonials([]));
        }, []);

        return (
          <div className="bg-gradient-to-b from-bgA to-bgB min-h-screen pb-24 md:pb-0">
            <header className="sticky top-0 z-50 glass border-b border-blue-100">
              <nav className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-2">
                <a href="#home" className="flex items-center gap-3">
                  <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-white border border-blue-100 overflow-hidden shadow-soft">
                    <img src="/static/images/logo.png" alt="London Kids Logo" className="w-full h-full object-cover scale-[1.85]" />
                  </div>
                  <div>
                    <p className="font-heading text-2xl sm:text-3xl text-blueMain leading-none">London Kids</p>
                    <p className="text-xs font-bold tracking-wide text-navyText">PRESCHOOL PACHORA</p>
                  </div>
                </a>

                <div className="hidden md:flex items-center gap-6 text-sm font-bold">
                  {navItems.map(([label, href]) => <a key={label} href={href} className="hover:text-blueMain transition">{label}</a>)}
                  <a href="tel:+918530838436" className="rounded-full bg-blueMain text-white px-4 py-2 shadow-soft">Call Now</a>
                </div>

                <button className="md:hidden rounded-xl border border-blue-100 bg-white px-3 py-2 shadow-soft" onClick={() => setMenuOpen((v) => !v)} aria-label="Toggle menu">
                  <span className={`hamburger-line ${menuOpen ? "translate-y-1.5 rotate-45" : ""}`}></span>
                  <span className={`hamburger-line my-1 ${menuOpen ? "opacity-0" : ""}`}></span>
                  <span className={`hamburger-line ${menuOpen ? "-translate-y-1.5 -rotate-45" : ""}`}></span>
                </button>
              </nav>

              {menuOpen && (
                <div className="md:hidden px-4 pb-3">
                  <div className="rounded-3xl bg-white border border-blue-100 p-4 shadow-strong">
                    <p className="text-xs font-accent font-bold tracking-[0.18em] text-blueMain">MENU</p>
                    <div className="mt-3 grid grid-cols-2 gap-2">
                      {navItems.map(([label, href]) => (
                        <a key={label} href={href} onClick={() => setMenuOpen(false)} className="rounded-xl bg-blue-50 border border-blue-100 px-3 py-2 text-center font-bold text-sm">
                          {label}
                        </a>
                      ))}
                    </div>
                    <div className="mt-4 grid grid-cols-2 gap-2">
                      <a href="tel:+918530838436" className="rounded-full bg-blueMain text-white py-2 text-center font-extrabold">Call</a>
                      <a href={ctaWhatsApp} target="_blank" className="rounded-full bg-emerald-500 text-white py-2 text-center font-extrabold">WhatsApp</a>
                    </div>
                  </div>
                </div>
              )}
            </header>

            <main>
              <section id="home" className="hero-bg">
                <div className="max-w-6xl mx-auto px-4 pt-10 pb-12 md:pt-16 md:pb-16">
                  <div className="grid md:grid-cols-2 gap-8 items-center">
                    <div>
                      <p className="inline-flex items-center gap-2 rounded-full bg-pinkSoft px-4 py-1 text-sm font-extrabold text-navyText">Admissions Open 2026-27 <span className="rounded-full bg-white px-2 py-0.5 text-xs">Limited Seats</span></p>
                      <h1 className="mt-4 font-heading text-4xl sm:text-5xl md:text-6xl leading-tight text-navyText">A Preschool That Feels Like Home</h1>
                      <p className="mt-4 text-base md:text-lg text-slate-700 max-w-xl">Give your child a joyful beginning with safe care, confident learning, loving teachers, and activity-based growth.</p>
                      <div className="mt-6 flex flex-wrap gap-3">
                        <a href="tel:+918530838436" className="rounded-full bg-blueMain text-white px-6 py-3 font-extrabold shadow-strong lift">Call for Admission</a>
                        <a href={ctaWhatsApp} target="_blank" className="rounded-full bg-emerald-500 text-white px-6 py-3 font-extrabold shadow-strong lift">WhatsApp Inquiry</a>
                      </div>
                    </div>

                    <div className="float">
                      <div className="rounded-[28px] bg-white p-3 shadow-strong border border-blue-100">
                        <img src="https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?auto=format&fit=crop&w=1200&q=80" alt="Happy preschool kids" className="w-full h-[300px] sm:h-[360px] object-cover rounded-3xl" />
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              <section className="bg-white border-y border-blue-100 py-2 marquee">
                <span className="font-accent text-sm font-bold text-blueMain">Admissions Open 2026-27 • Day Care to Senior KG • Safe Campus • Activity-Based Learning • Call 8530838436 •</span>
              </section>

              <section className="max-w-6xl mx-auto px-4 py-10">
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <div className="bg-white rounded-3xl p-5 shadow-soft border border-blue-100 text-center lift"><p className="text-3xl font-extrabold text-blueMain">{students}+</p><p className="font-bold">Happy Students</p></div>
                  <div className="bg-white rounded-3xl p-5 shadow-soft border border-blue-100 text-center lift"><p className="text-3xl font-extrabold text-blueMain">{teachers}+</p><p className="font-bold">Expert Teachers</p></div>
                  <div className="bg-white rounded-3xl p-5 shadow-soft border border-blue-100 text-center lift"><p className="text-3xl font-extrabold text-blueMain">{years}+</p><p className="font-bold">Years of Trust</p></div>
                </div>
              </section>

              <section id="programs" className="max-w-6xl mx-auto px-4 py-10">
                <h2 className="font-heading text-3xl md:text-4xl">Programs</h2>
                <p className="mt-1 text-slate-600">Structured learning with age-appropriate care and growth.</p>
                <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-5 mt-6">
                  {programs.map((p) => (
                    <article key={p.title} className="bg-white border border-blue-100 rounded-3xl p-6 shadow-soft lift">
                      <p className="inline-block rounded-full bg-blue-50 border border-blue-100 px-3 py-1 text-xs font-extrabold text-blueMain">{p.age}</p>
                      <h3 className="mt-3 text-2xl font-extrabold text-navyText">{p.title}</h3>
                      <p className="mt-2 text-slate-600">{p.desc}</p>
                      <a href="#contact" className="inline-block mt-4 font-bold text-blueMain">Apply Now</a>
                    </article>
                  ))}
                </div>

                <div className="mt-7 bg-white rounded-3xl p-6 border border-blue-100 shadow-soft">
                  <h3 className="text-xl font-extrabold">Age Groups Available</h3>
                  <div className="mt-4 grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
                    {ageGroups.map(([name, age]) => (
                      <div key={name} className="rounded-2xl border border-blue-100 px-4 py-3 bg-blue-50/40">
                        <p className="font-extrabold text-navyText">{name}</p>
                        <p className="text-sm text-slate-600">{age}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              <section id="activities" className="max-w-6xl mx-auto px-4 py-10">
                <h2 className="font-heading text-3xl md:text-4xl">Best Activities For Brain Development</h2>
                <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-6">
                  {activities.map(([title, desc]) => (
                    <article key={title} className="bg-white rounded-2xl p-5 border border-blue-100 shadow-soft lift">
                      <h3 className="font-extrabold text-navyText">{title}</h3>
                      <p className="mt-1 text-sm text-slate-600">{desc}</p>
                    </article>
                  ))}
                </div>
              </section>

              <section className="max-w-6xl mx-auto px-4 py-10">
                <div className="rounded-3xl bg-gradient-to-r from-blueMain to-indigo-500 p-7 md:p-10 shadow-strong text-white">
                  <h2 className="font-heading text-3xl md:text-4xl">Why Parents Trust London Kids</h2>
                  <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3 mt-5">
                    {trustPoints.map((x) => <div key={x} className="rounded-2xl bg-white/15 px-4 py-3 font-bold">{x}</div>)}
                  </div>
                </div>
              </section>

              <section id="director" className="max-w-6xl mx-auto px-4 py-10">
                <h2 className="font-heading text-3xl md:text-4xl">Director's Desk</h2>
                <div className="mt-6 grid md:grid-cols-2 gap-6 items-center">
                  <div className="w-full rounded-3xl shadow-strong bg-white p-2 border border-blue-100">
                    <img src="/static/images/director-final.png" alt="ER. BHUSHAN A. BANTHIYA Director" className="w-full h-auto max-h-[700px] object-contain rounded-2xl" />
                  </div>
                  <div className="bg-white rounded-3xl p-6 border border-blue-100 shadow-soft">
                    <p className="text-xs font-accent font-bold tracking-[0.18em] text-blueMain">LEADERSHIP MESSAGE</p>
                    <h3 className="mt-2 text-2xl font-extrabold">ER. BHUSHAN A. BANTHIYA</h3>
                    <p className="text-slate-600 font-semibold">Director, London Kids Preschool Pachora</p>
                    <p className="mt-4 text-slate-700">Our vision is to give every child a safe, joyful, and value-driven start through loving care, discipline, and activity-based learning.</p>
                    <div className="mt-5 flex flex-wrap gap-3">
                      <a href="#contact" className="rounded-full bg-blueMain text-white px-5 py-2 font-extrabold">Book School Visit</a>
                      <a href={ctaWhatsApp} target="_blank" className="rounded-full bg-emerald-500 text-white px-5 py-2 font-extrabold">Chat on WhatsApp</a>
                    </div>
                  </div>
                </div>
              </section>

              <section className="max-w-6xl mx-auto px-4 py-10">
                <h2 className="font-heading text-3xl md:text-4xl">Parent Testimonials</h2>
                <div className="grid md:grid-cols-3 gap-5 mt-6">
                  {testimonials.slice(0, 3).map((t, i) => (
                    <article key={i} className="bg-white rounded-3xl p-6 border border-blue-100 shadow-soft lift">
                      <p className="text-slate-700">"{t.text}"</p>
                      <p className="mt-4 font-extrabold">{t.name}</p>
                      <p className="text-sm text-slate-500">{t.relation}</p>
                    </article>
                  ))}
                </div>
              </section>

              <section id="contact" className="max-w-6xl mx-auto px-4 py-10 pb-20">
                <h2 className="font-heading text-3xl md:text-4xl">Contact & Visit</h2>
                <div className="grid md:grid-cols-2 gap-6 mt-6">
                  <div className="bg-white rounded-3xl p-6 border border-blue-100 shadow-soft">
                    <p className="font-extrabold text-lg">London Kids Preschool Pachora</p>
                    <p className="mt-2 text-slate-700">Sanghavi Colony, near Swami Samarth Mandir, behind Police Line, Pachora</p>
                    <p className="mt-1 text-slate-600 devanagari">संघवी कॉलनी, स्वामी समर्थ मंदिर जवळ, पोलिस लाईनच्या मागे, पाचोरा</p>
                    <p className="mt-4">Call: <a className="font-extrabold text-blueMain" href="tel:+918530838436">8530838436</a></p>
                    <p>Call: <a className="font-extrabold text-blueMain" href="tel:+917517513175">7517513175</a></p>
                    <div className="mt-5 flex flex-wrap gap-3">
                      <a className="rounded-full bg-pinkSoft px-5 py-2 font-extrabold" href="https://www.instagram.com/london_kids_pachora/" target="_blank">Instagram</a>
                      <a className="rounded-full bg-blueMain text-white px-5 py-2 font-extrabold" href="#home">Back to Top</a>
                    </div>
                  </div>

                  <iframe title="Google Maps Pachora" className="w-full h-80 rounded-3xl border-0 shadow-soft" loading="lazy" referrerPolicy="no-referrer-when-downgrade" src="https://www.google.com/maps?q=London%20Kids%20preschool%20pachora%20Sanghavi%20Colony%20Swami%20Samarth%20Mandir%20near%20Police%20Line%20Pachora&output=embed"></iframe>
                </div>
              </section>
            </main>

            <a href={ctaWhatsApp} target="_blank" className="fixed bottom-24 right-6 rounded-full bg-emerald-500 text-white w-14 h-14 grid place-items-center text-sm font-extrabold shadow-strong hover:scale-110 transition z-50" aria-label="WhatsApp Inquiry">WA</a>

            <div className="fixed bottom-0 inset-x-0 md:hidden z-40 bg-white/95 backdrop-blur border-t border-blue-100 p-3 flex gap-2">
              <a href="tel:+918530838436" className="flex-1 text-center rounded-full bg-blueMain text-white py-3 font-extrabold">Call Now</a>
              <a href={ctaWhatsApp} target="_blank" className="flex-1 text-center rounded-full bg-emerald-500 text-white py-3 font-extrabold">WhatsApp</a>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
